spring:
  application:
    name: backend

  datasource:
    url: ${POSTGRES_URL:jdbc:h2:mem:testdb}
    username: ${POSTGRES_USER:sa}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${SUPABASE_JWT_SECRET:super-secret-dummy-key-for-local-testing-only-keep-it-long}
    expiration-ms: 86400000 # 24 hours
